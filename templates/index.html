<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFarming</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://kit.fontawesome.com/6a4dfecb4a.js" crossorigin="anonymous"></script>
    <style>
        .landing-box {
            width: 90%;
            max-width: 480px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #73a580;
            padding: 50px 60px 60px;
            text-align: center;
        }
        .landing-box h1 {
            font-size: 30px;
            margin-bottom: 10px;
            color: black;
            position: relative;
        }
        .landing-box h1::after {
            content: '';
            width: 30px;
            height: 4px;
            border-radius: 3px;
            background: #3c00a0;
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
        }
        .landing-box p.subtitle {
            margin-top: 30px;
            margin-bottom: 40px;
            font-size: 14px;
            color: #2a2a2a;
        }
        .card-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            flex: 1;
            min-width: 140px;
            background: #eaeaea;
            border-radius: 8px;
            padding: 30px 20px;
            text-decoration: none;
            color: black;
            transition: background 0.3s, transform 0.2s;
        }
        .card:hover {
            background: #d0ddd2;
            transform: translateY(-3px);
        }
        .card i {
            font-size: 28px;
            color: #3c00a0;
            margin-bottom: 14px;
            display: block;
        }
        .card span {
            font-size: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="landing-box">
            <h1>SmartFarming</h1>
            <p class="subtitle">AI-powered crop and fertilizer recommendations for smarter agriculture</p>
            <div class="card-grid">
                <a href="/crop" class="card">
                    <i class="fa-solid fa-seedling"></i>
                    <span>Crop<br>Recommendation</span>
                </a>
                <a href="/fertilizer" class="card">
                    <i class="fa-solid fa-flask"></i>
                    <span>Fertilizer<br>Recommendation</span>
                </a>
                <a href="/insights" class="card">
                    <i class="fa-solid fa-chart-bar"></i>
                    <span>Model<br>Insights</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
